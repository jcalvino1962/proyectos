<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Camino a la Fama</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #0f1419; color: white; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        .card { background-color: #1d2125; border: 1px solid #333; border-radius: 15px; }
        .btn-x { background-color: #eff3f4; color: black; font-weight: bold; border-radius: 20px; padding: 10px 25px; transition: 0.3s; }
        .btn-x:hover { background-color: #d7dbdc; }
        .status-dot { height: 10px; width: 10px; background-color: #00ba7c; border-radius: 50%; display: inline-block; margin-right: 5px; }
    </style>
</head>
<body>
    <div class="container vh-100 d-flex flex-column justify-content-center align-items-center text-center">
        <h1 class="display-3 fw-bold mb-3">El Camino a la Fama</h1>
        <p class="lead mb-5 text-secondary">Bienvenido a tus Comunidades. Gestión inteligente para tu presencia en X.</p>
        
        <div class="card p-4 shadow-lg" style="max-width: 400px; width: 100%;">
            <div class="mb-4">
                <span class="status-dot"></span> <small class="text-success fw-bold">SISTEMA ACTIVO (Vía Kiwi)</small>
            </div>
            <h5 class="mb-4 text-white">Vinculación Local</h5>
            <p class="small text-secondary mb-4">Para iniciar, asegurate de tener abierta tu cuenta de X en una pestaña de este navegador.</p>
            
            <button class="btn btn-x w-100 mb-3" onclick="vincularConX()">Vincular vía Extensión</button>
            
            <div id="mensaje" class="mt-3 small text-info" style="display:none;">
                Esperando respuesta del script de Tampermonkey...
            </div>
        </div>
    </div>

    <script>
        function vincularConX() {
            document.getElementById('mensaje').style.display = 'block';
            // Aquí es donde tu script de Tampermonkey escuchará el evento
            window.postMessage({ type: "INICIAR_VINCULACION" }, "*");
        }
    </script>
</body>
</html>
